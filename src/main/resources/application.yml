spring:
  application:
    name: ecommerce-backend

# TODO - Create seperate database instead of connecting to default postgres database
  r2dbc:
    url: ${DB_URL:r2dbc:postgresql://localhost:5432/}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

  sql:
    init:
      mode: always
      schema-locations: file:sql_scripts/schema.sql

server:
  port: ${PORT:8080}

app:
  jwt:
    # Minimum 32 chars for HS256 — change this in production and inject via env var
    secret: "${JWT_SECRET:my-super-secret-key-change-in-production!}"
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}   # 24 hours
  scheduler:
    order-promotion-rate: ${ORDER_PROMOTION_RATE:300000}

logging:
  level:
    com.kev.ecom: ${LOG_LEVEL:DEBUG}
    org.springframework.r2dbc: ${LOG_LEVEL_R2DBC:DEBUG}
    org.springframework.security: ${LOG_LEVEL_SECURITY:DEBUG}
