spring:
  application:
    name: ecommerce-backend

  r2dbc:
    url: r2dbc:postgresql://localhost:5432/
    username: postgres
    password: postgres

  sql:
    init:
      mode: always   # runs schema.sql on startup

#  jackson:
#    property-naming-strategy: SNAKE_CASE
#    serialization:
#      write-dates-as-timestamps: false
#    deserialization:
#      fail-on-unknown-properties: false

server:
  port: 8080

# ── JWT ────────────────────────────────────────────────────────────────────────
app:
  jwt:
    # Minimum 32 chars for HS256 — change this in production and inject via env var
    secret: "${JWT_SECRET:my-super-secret-key-change-in-production!}"
    expiration-ms: 86400000   # 24 hours

logging:
  level:
    com.ecommerce: DEBUG
    org.springframework.r2dbc: DEBUG
    org.springframework.security: DEBUG
