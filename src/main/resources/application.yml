spring:
  application:
    name: ecommerce-backend

  # TODO - Hardcoded DB credentials to local. Change so it fetches from env var when deployed.
  r2dbc:
    url: r2dbc:postgresql://localhost:5432/
    username: postgres
    password: postgres

  sql:
    init:
      mode: always   # runs schema.sql on startup

server:
  port: 8080

app:
  jwt:
    # Minimum 32 chars for HS256 — change this in production and inject via env var
    secret: "${JWT_SECRET:my-super-secret-key-change-in-production!}"
    expiration-ms: 86400000   # 24 hours # TODO - Big expiry time for uninterrupted testing. Change to ideal value.

logging:
  level:
    com.ecommerce: DEBUG
    org.springframework.r2dbc: DEBUG
    org.springframework.security: DEBUG
